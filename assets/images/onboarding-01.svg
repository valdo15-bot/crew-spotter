<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#DA4531"/>
      <stop offset="100%" stop-color="#FEB15F"/>
    </linearGradient>
  </defs>

  <!-- Background rings -->
  <circle cx="140" cy="130" r="118" stroke="#3A3F52" stroke-width="1" opacity="0.4"/>
  <circle cx="140" cy="130" r="90" stroke="#3A3F52" stroke-width="1" opacity="0.25"/>

  <!-- Stage ground -->
  <ellipse cx="140" cy="212" rx="108" ry="13" fill="#2A2E3A"/>

  <!-- Person far-left -->
  <circle cx="58" cy="172" r="9" fill="#3A3F52"/>
  <rect x="49" y="182" width="18" height="26" rx="6" fill="#3A3F52"/>

  <!-- Person left -->
  <circle cx="96" cy="163" r="11" fill="#4A5066"/>
  <rect x="85" y="175" width="22" height="30" rx="7" fill="#4A5066"/>

  <!-- Person center (highlighted) -->
  <circle cx="140" cy="156" r="15" fill="url(#g1)"/>
  <rect x="125" y="172" width="30" height="36" rx="8" fill="url(#g1)"/>

  <!-- Person right -->
  <circle cx="184" cy="163" r="11" fill="#4A5066"/>
  <rect x="173" y="175" width="22" height="30" rx="7" fill="#4A5066"/>

  <!-- Person far-right -->
  <circle cx="222" cy="172" r="9" fill="#3A3F52"/>
  <rect x="213" y="182" width="18" height="26" rx="6" fill="#3A3F52"/>

  <!-- Location pin -->
  <path d="M140 52 C127 52 116 63 116 76 C116 94 140 116 140 116 C140 116 164 94 164 76 C164 63 153 52 140 52Z" fill="url(#g1)"/>
  <circle cx="140" cy="76" r="8" fill="#1C2130"/>

  <!-- Pin pulse rings -->
  <circle cx="140" cy="84" r="22" stroke="#E8773A" stroke-width="1.5" opacity="0.35"/>
  <circle cx="140" cy="84" r="36" stroke="#E8773A" stroke-width="1" opacity="0.2"/>
  <circle cx="140" cy="84" r="50" stroke="#E8773A" stroke-width="0.5" opacity="0.1"/>

  <!-- Dashed line pin → person -->
  <line x1="140" y1="116" x2="140" y2="156" stroke="#E8773A" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
</svg>
